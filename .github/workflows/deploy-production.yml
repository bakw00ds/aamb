name: Deploy — Production

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  guard:
    name: Manual-dispatch confirmation guard
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirmation input
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "deploy" ]]; then
            echo "::error::You must type 'deploy' in the confirm input to run this workflow."
            exit 1
          fi

  deploy:
    name: Build, lint, and deploy to aambarbershop.com
    runs-on: ubuntu-latest
    needs: [guard]
    if: |
      always() &&
      (needs.guard.result == 'success' || needs.guard.result == 'skipped')
    environment:
      name: production
      url: https://aambarbershop.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for html5validator)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install html5validator
        run: pip install --quiet html5validator

      - name: Lint HTML
        run: html5validator --root . --match "index.html" --log INFO

      - name: Update sitemap lastmod
        run: sed -i "s/YYYY-MM-DD/$(date +%Y-%m-%d)/g" sitemap.xml

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}
          aws-region: us-east-1

      - name: Sync site to S3
        run: |
          aws s3 sync . "s3://${{ secrets.S3_BUCKET_PRODUCTION }}/" \
            --delete \
            --exclude ".*" \
            --exclude ".*/*" \
            --exclude ".github/*" \
            --exclude "scripts/*" \
            --exclude "*.md" \
            --include ".well-known/*"

      - name: Set cache headers — index.html (short, revalidate)
        run: |
          aws s3 cp \
            "s3://${{ secrets.S3_BUCKET_PRODUCTION }}/index.html" \
            "s3://${{ secrets.S3_BUCKET_PRODUCTION }}/index.html" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=300, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Set cache headers — images (long, immutable)
        run: |
          aws s3 cp \
            "s3://${{ secrets.S3_BUCKET_PRODUCTION }}/images/" \
            "s3://${{ secrets.S3_BUCKET_PRODUCTION }}/images/" \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DIST_PRODUCTION }}" \
            --paths "/*"

      - name: Summary
        run: |
          {
            echo "### Production deploy complete"
            echo ""
            echo "- URL: https://aambarbershop.com"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
